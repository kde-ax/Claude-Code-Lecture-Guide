<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>팀장 프로모션 계산기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0D1B2A 0%, #1B263B 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: #1B263B;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header { text-align: center; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: #F77F00;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    h1 { color: #FFFFFF; font-size: 22px; font-weight: 700; }
    .input-group { margin-bottom: 16px; }
    label { display: block; color: #778DA9; font-size: 13px; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #415A77;
      border-radius: 12px;
      background: #0D1B2A;
      color: #FFFFFF;
      font-size: 18px;
      font-weight: 600;
    }
    input:focus { outline: none; border-color: #F77F00; }
    .result {
      background: #0D1B2A;
      border-radius: 16px;
      padding: 20px;
      margin-top: 24px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .result-row.main {
      padding-top: 14px;
      margin-top: 10px;
      border-top: 2px solid #F77F00;
    }
    .result-label { color: #778DA9; font-size: 13px; }
    .result-value { color: #FFFFFF; font-size: 14px; font-weight: 600; }
    .result-value.highlight { color: #F77F00; font-size: 26px; }
    .rate-bar { margin-top: 4px; height: 6px; background: #415A77; border-radius: 3px; overflow: hidden; }
    .rate-fill { height: 100%; background: #F77F00; border-radius: 3px; transition: width 0.3s; }
    .rate-fill.over { background: #06D6A0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="badge">2026 상반기</span>
      <h1>팀장</h1>
    </div>
    <div class="input-group">
      <label>구독수 (건)</label>
      <input type="number" id="subs" placeholder="0" oninput="calculate()">
    </div>
    <div class="input-group">
      <label>취급액 (억)</label>
      <input type="number" id="vol" step="0.1" placeholder="0" oninput="calculate()">
    </div>
    <div class="result">
      <div class="result-row">
        <span class="result-label">구독 달성률 (기본)</span>
        <span class="result-value" id="subRate">0%</span>
      </div>
      <div class="rate-bar"><div class="rate-fill" id="subBar" style="width:0%"></div></div>
      <div class="result-row" style="margin-top:10px">
        <span class="result-label">취급 달성률 (기본)</span>
        <span class="result-value" id="volRate">0%</span>
      </div>
      <div class="rate-bar"><div class="rate-fill" id="volBar" style="width:0%"></div></div>
      <div class="result-row" style="margin-top:12px">
        <span class="result-label">기본 인센티브</span>
        <span class="result-value" id="basic">0만원</span>
      </div>
      <div class="result-row">
        <span class="result-label">초과 보너스</span>
        <span class="result-value" id="bonus">0만원</span>
      </div>
      <div class="result-row main">
        <span class="result-label">최종 프로모션</span>
        <span class="result-value highlight" id="total">0만원</span>
      </div>
    </div>
  </div>
  <script>
    const CAP = 900;
    const SUB_BASE = 105;
    const VOL_BASE = 40;

    function calculate() {
      const subs = parseFloat(document.getElementById('subs').value) || 0;
      const vol  = parseFloat(document.getElementById('vol').value)  || 0;

      const subRate = subs / SUB_BASE;
      const volRate = vol  / VOL_BASE;

      const basic = Math.min(subRate, 1) * Math.min(volRate, 1) * CAP;
      const bonus = (Math.max(subRate - 1, 0) + Math.max(volRate - 1, 0)) * CAP * 0.3;
      const total = Math.min(basic + bonus, CAP);

      document.getElementById('subRate').textContent = (subRate * 100).toFixed(1) + '%';
      document.getElementById('volRate').textContent = (volRate * 100).toFixed(1) + '%';
      document.getElementById('basic').textContent   = Math.round(basic).toLocaleString() + '만원';
      document.getElementById('bonus').textContent   = Math.round(bonus).toLocaleString() + '만원';
      document.getElementById('total').textContent   = Math.round(total).toLocaleString() + '만원';

      const subBar = document.getElementById('subBar');
      const volBar = document.getElementById('volBar');
      subBar.style.width = Math.min(subRate * 100, 100) + '%';
      volBar.style.width = Math.min(volRate * 100, 100) + '%';
      subBar.className = 'rate-fill' + (subRate >= 1 ? ' over' : '');
      volBar.className = 'rate-fill' + (volRate >= 1 ? ' over' : '');
    }
  </script>
</body>
</html>
