<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>CCFM 프로모션 계산기</title>

    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase App/Auth/Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#F8FAFC',
                            input: '#1F2937',
                            avatar: '#8B5E55',
                            indigo: '#4F46E5',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar for sleek look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #CBD5E1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #94A3B8;
        }

        .tab-active {
            border-bottom: 2px solid #3B82F6;
            /* Blue-500 */
            color: #3B82F6;
            font-weight: 600;
        }

        .tab-inactive {
            color: #64748B;
            /* Slate-500 */
            border-bottom: 2px solid transparent;
        }

        .tab-inactive:hover {
            color: #334155;
            /* Slate-700 */
        }
    </style>
</head>

<body class="bg-[#F8FAFC] font-sans antialiased text-slate-800 min-h-screen flex flex-col items-center justify-center">

    <!-- Login Screen (Initially Visible) -->
    <div id="login-screen" class="w-full max-w-md p-8 text-center animate-in fade-in duration-700">
        <div class="mb-8 flex flex-col items-center">
            <img src="ccfm_logo.png" alt="CCFM Logo" class="h-48 -mb-4 object-contain">
            <p class="text-slate-700 font-black text-2xl">프로모션 시뮬레이터</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 flex flex-col gap-6">
            <h2 class="text-xl font-bold text-slate-800">계속하려면 로그인하세요</h2>
            <button id="google-login-btn" onclick="loginWithGoogle()"
                class="flex items-center justify-center gap-3 w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl font-semibold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm active:scale-[0.98]">
                <svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M19.6001 10.2269C19.6001 9.55163 19.5395 8.90226 19.4277 8.27734H10V12.0123H15.3821C15.1501 13.2642 14.4445 14.3245 13.3813 15.0357V17.5028H16.6224C18.5186 15.7578 19.6001 13.197 19.6001 10.2269Z"
                        fill="#4285F4" />
                    <path
                        d="M10 20C12.7 20 14.9636 19.1023 16.6224 17.5028L13.3813 15.0357C12.4828 15.6373 11.3415 15.9936 10 15.9936C7.39121 15.9936 5.18432 14.2307 4.39695 11.8596H1.05078V14.4534C2.7121 17.756 6.0898 20 10 20Z"
                        fill="#34A853" />
                    <path
                        d="M4.39695 11.8596C4.19717 11.2642 4.0834 10.6309 4.0834 9.97341C4.0834 9.31589 4.19717 8.68261 4.39695 8.08722V5.49341H1.05078C0.380846 6.82914 0 8.33089 0 9.97341C0 11.6159 0.380846 13.1177 1.05078 14.4534L4.39695 11.8596Z"
                        fill="#FBBC05" />
                    <path
                        d="M10 3.96136C11.4682 3.96136 12.7852 4.46591 13.8213 5.45455L16.6946 2.58136C14.9575 0.981818 12.6939 0 10 0C6.0898 0 2.7121 2.24395 1.05078 5.45341L4.39695 8.08722C5.18432 5.71614 7.39121 3.96136 10 3.96136Z"
                        fill="#EA4335" />
                </svg>
                Google 계정으로 로그인
            </button>

        </div>
    </div>

    <!-- Sticky Header (Hidden initially) -->
    <header id="main-header"
        class="hidden fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm h-16 flex items-center justify-between px-4 md:px-6 transition-all duration-300">
        <!-- Logo & Title -->
        <div class="flex items-center gap-3 cursor-pointer" onclick="switchView('계산기')">
            <div
                class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white shadow-indigo-200 shadow-lg">
                <!-- Icon: BarChart3 (Lucide) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3v18h18" />
                    <path d="M18 17V9" />
                    <path d="M13 17V5" />
                    <path d="M8 17v-3" />
                </svg>
            </div>
            <h1 class="font-bold text-lg tracking-tight text-slate-900">CCFM 프로모션 계산기</h1>
        </div>

        <!-- Navigation Menu -->
        <nav class="hidden md:flex items-center gap-1 bg-slate-100/50 p-1 rounded-full border border-slate-200/50">
            <button onclick="switchView('부팀장')"
                class="nav-item px-4 py-1.5 text-sm font-medium rounded-full text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all">부팀장</button>
            <button onclick="switchView('팀장')"
                class="nav-item px-4 py-1.5 text-sm font-medium rounded-full text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all">팀장</button>
            <button onclick="switchView('본부장')"
                class="nav-item px-4 py-1.5 text-sm font-medium rounded-full text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all">본부장</button>
            <button onclick="switchView('경영진')"
                class="nav-item px-4 py-1.5 text-sm font-medium rounded-full text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all">경영진</button>
            <button onclick="switchView('계산기')"
                class="nav-item px-4 py-1.5 text-sm font-medium rounded-full text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all bg-white text-indigo-600 shadow-sm font-semibold ring-1 ring-slate-200">계산기</button>
        </nav>

        <!-- Mobile Menu Button (Visible only on small screens) -->
        <button class="md:hidden p-2 text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" x2="20" y1="12" y2="12" />
                <line x1="4" x2="20" y1="6" y2="6" />
                <line x1="4" x2="20" y1="18" y2="18" />
            </svg>
        </button>

        <!-- User Avatar & Profile -->
        <div class="flex items-center gap-3 pl-4 border-l border-slate-200 ml-2 relative group">
            <div id="user-avatar-container"
                class="flex items-center gap-3 cursor-pointer py-1 px-2 rounded-xl border border-transparent hover:bg-slate-100 hover:border-slate-200 transition-all">
                <div id="user-display-name" class="hidden sm:block text-sm font-semibold text-slate-700">사용자</div>
                <div id="user-avatar"
                    class="w-9 h-9 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center text-white text-sm font-bold shadow-md ring-2 ring-white transition-transform">
                    <!-- Default Initial -->
                    <span id="user-initial">?</span>
                </div>
            </div>

            <!-- Dropdown Menu -->
            <div
                class="absolute right-0 top-full mt-2 w-48 bg-white rounded-2xl shadow-xl shadow-slate-200/80 border border-slate-100 p-2 invisible group-hover:visible opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all origin-top-right">
                <button onclick="logout()"
                    class="w-full text-left px-4 py-3 text-sm text-rose-600 font-semibold rounded-xl hover:bg-rose-50 transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" x2="9" y1="12" y2="12" />
                    </svg>
                    로그아웃
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area (Hidden initially) -->
    <main id="main-container" class="hidden flex-1 max-w-7xl mx-auto w-full p-4 md:p-8 space-y-8 mt-16">
        <!-- Content will be injected or toggled here -->
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            projectId: "promotioncalculator",
            appId: "1:324862190858:web:e20e8e3bf875f2d9df46f3",
            storageBucket: "promotioncalculator.firebasestorage.app",
            apiKey: "AIzaSyBFuhW2QDFP6mwITZlIyD93F29Ugd4Hyto",
            authDomain: "promotioncalculator.firebaseapp.com",
            messagingSenderId: "324862190858",
            projectNumber: "324862190858",
            databaseURL: "https://promotioncalculator-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // Auth Logic
        function loginWithGoogle() {
            auth.signInWithPopup(googleProvider).catch(err => {
                console.error("Login failed", err);
                alert("로그인에 실패했습니다: " + err.message);
            });
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.reload();
            });
        }

        // Function to update header UI (display name and avatar)
        function updateHeaderUI(user) {
            const name = user.displayName || user.email.split('@')[0];
            const nameElement = document.getElementById('user-display-name');
            if (nameElement) nameElement.innerText = name;

            const avatar = document.getElementById('user-avatar');
            if (!avatar) return;

            if (user.photoURL) {
                avatar.innerHTML = `<img src="${user.photoURL}" class="w-full h-full object-cover">`;
            } else {
                avatar.innerHTML = `<span id="user-initial">${name.charAt(0).toUpperCase()}</span>`;
                avatar.style.backgroundColor = '#8B5E55';
            }
        }

        // Global Error Handler
        window.addEventListener('unhandledrejection', event => {
            console.error('Unhandled rejection:', event.reason);
            // alert('오류가 발생했습니다 (Rejection): ' + event.reason);
        });

        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error('Error: ' + msg + '\nScript: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nStackTrace: ' + (error ? error.stack : ''));
            // alert('오류가 발생했습니다: ' + msg);
            return false;
        };

        // Monitoring Auth State
        auth.onAuthStateChanged(async user => {
            const loginScreen = document.getElementById('login-screen');
            const mainHeader = document.getElementById('main-header');
            const mainContainer = document.getElementById('main-container');
            const body = document.body;

            console.log('%c[Auth Status]', 'color: #4F46E5; font-weight: bold', user ? `Logged in as ${user.email}` : 'Logged out');

            if (user) {
                // 로그인 감지 즉시 UI 준비 (DB 조회가 늦어져도 화면은 넘어간 느낌을 줌)
                loginScreen.classList.add('hidden');

                try {
                    const emailKey = user.email.replace(/\./g, '_');
                    console.log(`[DB] Checking: users/${emailKey}`);

                    const snapshot = await database.ref('users/' + emailKey).once('value');

                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        console.log('[DB] Found user data:', userData);

                        // 대시보드 강제 노출
                        mainHeader.classList.remove('hidden');
                        mainContainer.classList.remove('hidden');
                        body.classList.remove('items-center', 'justify-center', 'h-screen');
                        body.classList.add('flex-col');

                        updateHeaderUI(user);
                        init(userData);
                    } else {
                        console.warn('[DB] Not found by key, trying fallback...');
                        const fallbackSnapshot = await database.ref('users')
                            .orderByChild('식별자')
                            .equalTo(user.email)
                            .once('value');

                        if (fallbackSnapshot.exists()) {
                            let foundData = null;
                            fallbackSnapshot.forEach(child => { foundData = child.val(); });

                            mainHeader.classList.remove('hidden');
                            mainContainer.classList.remove('hidden');
                            body.classList.remove('items-center', 'justify-center');
                            body.classList.add('flex-col');
                            updateHeaderUI(user);
                            init(foundData);
                        } else {
                            console.error('[DB] User not found in database');
                            alert('등록되지 않은 사용자입니다. 관리자에게 문의하세요.');
                            auth.signOut();
                            window.location.reload();
                        }
                    }
                } catch (e) {
                    console.error('[DB] Error:', e);
                    alert('데이터베이스 연결 실패: ' + e.message);
                    auth.signOut();
                }
            } else {
                // Logged Out
                loginScreen.classList.remove('hidden');
                mainHeader.classList.add('hidden');
                mainContainer.classList.add('hidden');
                body.classList.add('items-center', 'justify-center');
                body.classList.remove('flex-col');
            }
        });
        // Data Structures
        const roles = [
            {
                id: 'perf_marketer',
                name: '퍼포먼스 마케터',
                getFileName: (level) => `Marketer_Lv${level.replace(/\D/g, '')}_Calc.html`,
                color: '#00B4D8',
            },
            {
                id: 'video_designer',
                name: '영상 디자이너',
                getFileName: (level) => `VideoDesigner_Lv${level.replace(/\D/g, '')}_Calc.html`,
                color: '#F43F5E',
            },
            {
                id: 'designer',
                name: '디자이너',
                getFileName: (level) => `Designer_Lv${level.replace(/\D/g, '')}_Calc.html`,
                color: '#EC4899',
            },
            {
                id: 'full_stack',
                name: '풀 스택 마케터',
                getFileName: (level) => `Fullstack_Lv${level.replace(/\D/g, '')}_Calc.html`,
                color: '#10B981',
            }
        ];

        const levels = ['L1', 'L2', 'L3', 'L4', 'L5'];

        // State
        let currentView = '계산기';
        let activeTabs = {
            'perf_marketer': 'L1',
            'designer': 'L1',
            'video_designer': 'L1',
            'full_stack': 'L1'
        };
        let activeRoleFilterId = null; // Filter for calculator view
        let currentUserData = null;

        const mainContainer = document.getElementById('main-container');

        // Initialize
        function init(userData) {
            currentUserData = userData;

            // UI 노출
            const mainHeader = document.getElementById('main-header');
            const mainContainer = document.getElementById('main-container');
            mainHeader.classList.remove('hidden');
            mainContainer.classList.remove('hidden');

            if (userData) {
                // 1. 헤더 직함 표시 (직군 레벨 직책 형식)
                const roleInfo = [userData.job_family, userData.level, userData.position].filter(Boolean).join(' ');
                document.getElementById('user-display-name').innerText = `${auth.currentUser.displayName} (${roleInfo})`;

                // 2. 상단 메뉴 권한 제어 (계층형)
                const navWrapper = document.querySelector('nav');
                if (navWrapper) navWrapper.classList.remove('hidden');

                const navItems = document.querySelectorAll('.nav-item');

                // 직위 계층 정의
                const userPos = userData.position || userData.permissions || '';
                const isSubTeamLeader = userPos.includes('부팀장');
                const isTeamLeader = userPos.includes('팀장') && !isSubTeamLeader;
                const isGM = userPos.includes('본부장');
                const isManagement = userPos.includes('경영진') || userPos.includes('이사');

                navItems.forEach(item => {
                    const viewName = item.innerText.trim();
                    let show = false;

                    if (isSubTeamLeader) {
                        show = (viewName === '부팀장');
                    } else if (isTeamLeader) {
                        show = (viewName === '부팀장' || viewName === '팀장');
                    } else if (isGM) {
                        show = (viewName === '부팀장' || viewName === '팀장' || viewName === '본부장' || viewName === '계산기');
                    } else if (isManagement) {
                        show = true; // 모든 메뉴 노출
                    }

                    if (show) {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });

                // 3. 직군 필터 및 무제한 권한 설정
                const userJobFamily = (userData.job_family || '').replace(/\s/g, '');

                // 본부장 이상은 모든 탭/레벨 노출 (필터 해제)
                if (isGM || isManagement) {
                    activeRoleFilterId = null;
                } else {
                    // 일반 사용자 및 하위 관리자는 본인 직군만 노출
                    const matchedRole = roles.find(role => {
                        const roleName = role.name.replace(/\s/g, '');
                        // 딱 맞는 직군이거나, 사용자의 직군 명칭에 서비스의 직군명이 포함된 경우 (예: '영상 디자이너' 유저가 '영상디자이너' 매칭)
                        return userJobFamily === roleName || userJobFamily.includes(roleName);
                    });

                    if (matchedRole) {
                        activeRoleFilterId = matchedRole.id;
                        activeTabs[matchedRole.id] = userData.level || 'L1';
                    }
                }
            }

            renderCalculatorView();
        }

        // View Switching Logic
        function switchView(viewName) {
            currentView = viewName;
            updateNavStyles();

            if (viewName === '계산기') {
                renderCalculatorView();
            } else {
                renderIframeView(`${viewName}.html`);
            }
        }

        function updateNavStyles() {
            const btns = document.querySelectorAll('.nav-item');
            btns.forEach(btn => {
                if (btn.innerText.trim() === currentView) {
                    btn.classList.add('bg-white', 'text-indigo-600', 'shadow-sm', 'font-semibold', 'ring-1', 'ring-slate-200');
                    btn.classList.remove('text-slate-600', 'hover:bg-white');
                } else {
                    btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm', 'font-semibold', 'ring-1', 'ring-slate-200');
                    btn.classList.add('text-slate-600', 'hover:bg-white');
                }
            });
        }

        // Render Functions
        function renderCalculatorView() {
            mainContainer.innerHTML = ''; // Clear container

            // 관리자 여부 확인
            const managementRoles = ['부팀장', '팀장', '본부장', '이사', '경영진'];
            const isManagement = currentUserData && managementRoles.some(r =>
                (currentUserData.position && currentUserData.position.includes(r)) ||
                (currentUserData.permissions && currentUserData.permissions.includes(r))
            );

            roles.forEach(role => {
                // 필터가 설정되어 있으면 해당 직군만 렌더링
                if (activeRoleFilterId && role.id !== activeRoleFilterId) return;
                const section = document.createElement('section');
                section.className = 'w-full bg-white rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-100 overflow-hidden';

                // Header of Section
                const header = document.createElement('div');
                header.className = 'px-6 py-5 border-b border-slate-100 flex items-center gap-3 bg-gradient-to-r from-slate-50 to-white';

                // Dynamic style for icon container
                const iconContainerStyle = `color: ${role.color}; background-color: ${role.color}15;`;

                header.innerHTML = `
                   <div class="p-1.5 rounded-lg" style="${iconContainerStyle}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                   </div>
                   <h2 class="text-lg font-bold text-slate-800">${role.name}</h2>
                `;
                section.appendChild(header);

                // Tabs
                const tabsContainer = document.createElement('div');
                tabsContainer.className = 'flex items-center px-6 gap-6 border-b border-slate-100 bg-white';

                levels.forEach(level => {
                    // 관리자가 아니면 본인 레벨만 표시
                    if (!isManagement && currentUserData && currentUserData.level && level !== currentUserData.level) return;

                    const tab = document.createElement('button');
                    const isActive = activeTabs[role.id] === level;

                    // Dynamic Tab Styles
                    if (isActive) {
                        tab.style.borderBottom = `2px solid ${role.color}`;
                        tab.style.color = role.color;
                        tab.style.fontWeight = '600';
                        tab.className = 'py-3 text-sm transition-all duration-200';
                    } else {
                        tab.className = 'py-3 text-sm transition-all duration-200 tab-inactive';
                    }

                    tab.innerText = level;
                    tab.onclick = () => {
                        activeTabs[role.id] = level;
                        renderCalculatorView(); // Uses global activeRoleFilterId
                    };
                    tabsContainer.appendChild(tab);
                });
                section.appendChild(tabsContainer);

                // Content Area (Iframe or Placeholder)
                const contentArea = document.createElement('div');
                contentArea.className = 'p-6 bg-slate-50/50';

                // Card for Loaded Content
                const card = document.createElement('div');
                card.className = 'w-full bg-white rounded-xl shadow-sm border border-slate-200 min-h-[800px] flex flex-col items-center justify-center text-slate-400 gap-4 transition-all duration-300';

                // Actual connection logic to load external file
                let targetFile;
                if (role.getFileName) {
                    targetFile = role.getFileName(activeTabs[role.id]);
                } else {
                    targetFile = `${role.filePrefix}_${activeTabs[role.id]}.html`;
                }

                // Using iframe for isolation and file loading as requested
                const iframe = document.createElement('iframe');
                iframe.src = targetFile;
                iframe.className = "w-full h-full rounded-xl border-none";

                // Fallback / Loading logic visualization
                iframe.onload = function () {
                    // Try to adjust height to fit content
                    try {
                        const doc = iframe.contentWindow.document;
                        const height = doc.body.scrollHeight;
                        if (height > 0) {
                            iframe.style.height = (height + 50) + 'px'; // Add some padding
                            card.style.minHeight = (height + 50) + 'px';
                        }
                    } catch (e) {
                        console.warn('Cannot auto-resize iframe due to CORS or other error', e);
                    }
                };
                iframe.onerror = function () {
                    card.innerHTML = `<span class="text-sm">파일을 찾을 수 없습니다: ${targetFile}</span>`;
                };

                contentArea.appendChild(iframe);
                section.appendChild(contentArea);

                mainContainer.appendChild(section);
            });
        }

        function renderIframeView(filename) {
            mainContainer.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.src = filename;
            iframe.className = "w-full h-[calc(100vh-8rem)] rounded-2xl bg-white shadow-lg border border-slate-200";
            mainContainer.appendChild(iframe);
        }



    </script>
</body>

</html>
