version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: reseller-backend
    ports:
      - "8000:8000"
    volumes:
      - ./reseller_back:/app
      - /app/__pycache__
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: reseller-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./reseller_front:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  browser-opener:
    image: alpine:latest
    container_name: browser-opener
    depends_on:
      frontend:
        condition: service_healthy
    command: >
      sh -c "
      echo '✅ 서버 준비 완료!';
      echo '🌐 브라우저를 열어주세요: http://localhost:3000';
      sleep infinity
      "
    networks:
      - app-network

networks:
  app-network:
    driver: bridge